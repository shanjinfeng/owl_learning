[Camera]
resolution_width = 2048
resolution_height = 1536

[System]
# 摄像头到喷头的纵向距离 (m)
camera_to_light_y = 2.40
# 喷洒开启持续时间 (秒)
spray_duration = 0.15
# 喷头相对于图像底边的物理距离 (米)
nozzle_offset_m = 0.045
# 逆透视变换矩阵路径
ipm_matrix_path = calibration/calibration/H.npy
# 记忆二维码防止重复喷洒的时间 (秒)
track_timeout_s = 5.0
# 继电器响应补偿 (秒)
relay_response_s = 0.05
# 安全超时系数
safety_timeout_factor = 2.0

[Relays]
0 = 29
1 = 31
2 = 32
3 = 33

[Nozzles]
x_positions = -0.45, -0.15, 0.15, 0.45
# 逆透视后按车道均分：二维码按 X 所在车道分配喷头
lane_count = 4
# 相机在地面的可视宽度（米）
fov_ground_width_m = 1.2

[Flow]
# 光流降采样比例，参考 utils/optical_flow.py
downsample_scale = 0.25
# 认为速度有效的最少内点数
min_inliers = 5
# 物理位移 RANSAC 阈值 (m)
ransac_threshold_m = 0.03
# 角点数量上限
max_corners = 120
# goodFeaturesToTrack qualityLevel
quality_level = 0.03
# goodFeaturesToTrack minDistance
min_distance = 5

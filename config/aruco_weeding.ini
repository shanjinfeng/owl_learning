[Camera]
resolution_width = 2048
resolution_height = 1536

[System]
# 行驶速度 (m/s)
speed = 0.5
# 喷洒开启持续时间 (秒)
spray_duration = 0.15
# 喷头相对于图像底边(画面最下方)的物理距离 (米) -> 4.5cm = 0.045m
nozzle_offset_m = 0.045
# 逆透视变换矩阵路径
ipm_matrix_path = calibration/calibration/H.npy
# 记忆二维码防止重复喷洒的时间 (秒)
track_timeout_s = 5.0

[Relays]
# 继电器映射，键为喷嘴ID，值为 Jetson GPIO BOARD 引脚号
0 = 29
1 = 31
2 = 32
3 = 33

[Nozzles]
# 喷头在现实世界中的横向 X 坐标(相对于摄像机中心点，向右为正，单位：米)
# 假设车宽 0.6m，均分为 4 个喷头
x_positions = -0.225, -0.075, 0.075, 0.225
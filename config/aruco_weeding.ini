[Camera]
resolution_width = 2048
resolution_height = 1536

[System]
# 行驶速度 (m/s)
speed = 0.5
# 喷洒开启持续时间 (秒)
spray_duration = 0.15
# 喷头相对于图像底边(画面最下方)的物理距离 (米) -> 4.5cm = 0.045m
nozzle_offset_m = 0.045
# 逆透视变换矩阵路径
ipm_matrix_path = calibration/calibration/H.npy
# 记忆二维码防止重复喷洒的时间 (秒)
track_timeout_s = 5.0
# 继电器响应延迟 (秒)，从GPIO信号发出到喷洒开始的时间
relay_response_s = 0.05

[Relays]
# 继电器映射，键为喷嘴ID，值为 Jetson GPIO BOARD 引脚号
0 = 29
1 = 31
2 = 32
3 = 33

[Nozzles]
# 喷头在现实世界中的横向 X 坐标(相对于摄像机中心点，向右为正，单位：米)
# 假设车宽 0.6m，均分为 4 个喷头
x_positions = -0.45, -0.15, 0.15, 0.45
# 逆透视后按车道均分：二维码按 X 所在车道分配喷头
lane_count = 4
# 相机在地面的可视宽度（米）
fov_ground_width_m = 1.2
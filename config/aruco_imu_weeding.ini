[Camera]
resolution_width = 2048
resolution_height = 1536

[System]
# 摄像头到喷头的纵向距离 (m)
camera_to_light_y = 2.40
# 喷洒开启持续时间 (秒)
spray_duration = 0.15
# 喷头相对于图像底边的物理距离 (米)
nozzle_offset_m = 0.045
# 逆透视变换矩阵路径
ipm_matrix_path = calibration/calibration/H.npy
# 记忆二维码防止重复喷洒的时间 (秒)
track_timeout_s = 5.0
# 继电器响应补偿 (秒)
relay_response_s = 0.05
# 安全超时系数
safety_timeout_factor = 2.0

[Relays]
0 = 29
1 = 31
2 = 32
3 = 33

[Nozzles]
x_positions = -0.45, -0.15, 0.15, 0.45
# 逆透视后按车道均分：二维码按 X 所在车道分配喷头
lane_count = 4
# 相机在地面的可视宽度（米）
fov_ground_width_m = 1.2

[Flow]
# 保留该节以兼容 aruco_flow_weeder 的父类初始化；IMU 版不使用光流结果。
downsample_scale = 0.25
min_inliers = 5
ransac_threshold_m = 0.03
max_corners = 120
quality_level = 0.03
min_distance = 5

[IMU]
# 串口设备
port = /dev/ttyUSB0
# 波特率
baud = 9600
# 自动校准
auto_calibrate = true
# 自动校准采样数
calibration_samples = 120
# 自动校准最长等待时间
calibration_timeout_s = 15.0
# 静止判定阈值：线加速度 (g)
stationary_accel_threshold_g = 0.15
# 静止判定阈值：角速度 (°/s)
stationary_gyro_threshold_dps = 3.0
# 使用 IMU 的哪个轴作为前向速度
forward_axis = y
# 前向速度符号，若方向相反可改为 -1
forward_sign = 1.0
# 速度阻尼时间常数，越大越平滑
velocity_damp_tau_s = 8.0
# 串口轮询超时时间
read_timeout_s = 0.03
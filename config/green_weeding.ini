[Camera]
resolution_width = 2048
resolution_height = 1536

[System]
# 行驶速度 (m/s)
speed = 0.5
# 喷洒开启持续时间 (秒)
spray_duration = 0.15
# 喷头相对于图像底边(画面最下方)的物理距离 (米)
nozzle_offset_m = 0.045
# 逆透视变换矩阵路径
ipm_matrix_path = calibration/calibration/H.npy
# 记忆防止重复喷洒的时间 (秒)
track_timeout_s = 5.0
# 继电器响应延迟 (秒)
relay_response_s = 0.05

[Relays]
0 = 29
1 = 31
2 = 32
3 = 33

[Nozzles]
x_positions = -0.45, -0.15, 0.15, 0.45
# 逆透视后按车道均分：二维码/绿色目标按 X 所在车道分配喷头
lane_count = 4
# 相机在地面的可视宽度（米）
fov_ground_width_m = 1.2

[Detection]
# 连续检测阈值：需要连续出现多少帧才认为是真实目标
min_consecutive_frames = 1
# 跟踪稳定 IOU 阈值（越大越严格）
track_iou_threshold = 0.3
# 检测丢失后最多保留多少帧
track_max_age = 5
